name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun run test
      - name: Smoke test CLI
        run: |
          node bin/mypi.mjs list
          node bin/mypi.mjs install --dry-run --yes
          node bin/mypi.mjs install --dry-run --only core
          node bin/mypi.mjs status || true
