name: Update pins

on:
  schedule:
    - cron: '0 0 * * 1' # 毎週月曜 09:00 JST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Update catalog pins
        run: node scripts/update-pins.mjs
      - name: Update mitsupi within semver range
        run: bun update mitsupi
      - name: Sync goal.ts from upstream
        run: bun run sync:goal
      - name: Run tests
        run: bun run test
      - name: Smoke test CLI
        run: |
          node bin/mypi.mjs list
          node bin/mypi.mjs install --dry-run --yes
      - uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          branch: auto/update-pins
          delete-branch: true
          title: 'pi package の pin を自動更新'
          commit-message: |
            pi package の pin を自動更新

            update-pins workflow による自動更新。catalog の npm / git pin、
            mitsupi(semver 範囲内)、vendored goal.ts を最新化する。
          body: |
            週次の update-pins workflow による自動更新です。

            - `scripts/update-pins.mjs` で catalog の npm pin / git commit pin を最新化
            - `bun update mitsupi` で lockfile を semver 範囲内で更新
            - `bun run sync:goal` で vendored goal.ts を upstream HEAD に同期
            - `bun run test` と CLI の dry-run smoke は本 PR 作成前に pass 済み

            merge 後、手元には `bun run setup`(または `mypi update`)で反映してください。
